<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 560" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="woodR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7B1C0A"/>
      <stop offset="40%"  stop-color="#5C1200"/>
      <stop offset="100%" stop-color="#3A0A00"/>
    </linearGradient>
    <linearGradient id="goldShineR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFE066"/>
      <stop offset="40%"  stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="panelBgR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#6B1500"/>
      <stop offset="100%" stop-color="#3D0800"/>
    </linearGradient>
    <pattern id="woodGrainR" x="0" y="0" width="4" height="80" patternUnits="userSpaceOnUse">
      <rect width="4" height="80" fill="none"/>
      <line x1="4" y1="0" x2="0" y2="80" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Door base -->
  <rect x="0" y="0" width="200" height="560" fill="url(#woodR)"/>
  <rect x="0" y="0" width="200" height="560" fill="url(#woodGrainR)"/>

  <!-- Outer gold border -->
  <rect x="4" y="4" width="192" height="552" fill="none" stroke="url(#goldShineR)" stroke-width="3" rx="2"/>
  <!-- Inner gold border -->
  <rect x="10" y="10" width="180" height="540" fill="none" stroke="#D4A017" stroke-width="1" stroke-opacity="0.5" rx="1"/>

  <!-- ═══ TOP ARCH PANEL ═══ -->
  <rect x="18" y="18" width="164" height="120" fill="url(#panelBgR)" rx="4" stroke="#D4A017" stroke-width="1.5"/>
  <rect x="22" y="22" width="156" height="112" fill="none" stroke="#D4A017" stroke-width="0.6" stroke-opacity="0.4" rx="2"/>

  <!-- Lotus flower top panel (same as left, symmetric) -->
  <ellipse cx="100" cy="68" rx="8" ry="18" fill="#D4A017" opacity="0.85" transform="rotate(0,100,78)"/>
  <ellipse cx="100" cy="68" rx="8" ry="18" fill="#D4A017" opacity="0.75" transform="rotate(45,100,78)"/>
  <ellipse cx="100" cy="68" rx="8" ry="18" fill="#D4A017" opacity="0.75" transform="rotate(90,100,78)"/>
  <ellipse cx="100" cy="68" rx="8" ry="18" fill="#D4A017" opacity="0.75" transform="rotate(135,100,78)"/>
  <ellipse cx="100" cy="68" rx="8" ry="18" fill="#D4A017" opacity="0.6" transform="rotate(22.5,100,78)"/>
  <ellipse cx="100" cy="68" rx="8" ry="18" fill="#D4A017" opacity="0.6" transform="rotate(67.5,100,78)"/>
  <ellipse cx="100" cy="68" rx="8" ry="18" fill="#D4A017" opacity="0.6" transform="rotate(112.5,100,78)"/>
  <ellipse cx="100" cy="68" rx="8" ry="18" fill="#D4A017" opacity="0.6" transform="rotate(157.5,100,78)"/>
  <circle cx="100" cy="78" r="10" fill="#FFD700" opacity="0.9"/>
  <circle cx="100" cy="78" r="6"  fill="#D4A017"/>
  <circle cx="100" cy="78" r="3"  fill="#FFE066"/>

  <!-- Corner swirls top panel -->
  <path d="M26 26 Q34 26 34 34 Q34 42 26 42" fill="none" stroke="#D4A017" stroke-width="1.2" stroke-opacity="0.7"/>
  <circle cx="26" cy="26" r="2" fill="#D4A017" opacity="0.7"/>
  <path d="M174 26 Q166 26 166 34 Q166 42 174 42" fill="none" stroke="#D4A017" stroke-width="1.2" stroke-opacity="0.7"/>
  <circle cx="174" cy="26" r="2" fill="#D4A017" opacity="0.7"/>
  <path d="M26 130 Q34 130 34 122 Q34 114 26 114" fill="none" stroke="#D4A017" stroke-width="1.2" stroke-opacity="0.7"/>
  <circle cx="26" cy="130" r="2" fill="#D4A017" opacity="0.7"/>
  <path d="M174 130 Q166 130 166 122 Q166 114 174 114" fill="none" stroke="#D4A017" stroke-width="1.2" stroke-opacity="0.7"/>
  <circle cx="174" cy="130" r="2" fill="#D4A017" opacity="0.7"/>

